<!DOCTYPE html>
<html>
<head>
    <title>Perfil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="menu-burger.css">
    <link rel="shortcut icon" href="treino-icon.png" type="image/x-png">
</head>
<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div id="menu" class="menu">
        <div class="perfil">
            <img id="avatarMenu" class="avatar" src="default.png">
            <span>lucca.severo@hotmail.com</span>
        </div>
        <a href="index.html">🏋️ Gerar Treino</a>
        <a href="meus-treinos.html">📚 Meus Treinos</a>
        <a href="perfil.html">👤 Perfil</a>
        <button onclick="logout()">🚪 Sair</button>
    </div>

<div class="container">

    <h2>👤 Meu Perfil</h2>

    <div class="perfil-box">

        <img id="avatar" class="avatar-img" src="default.png">

        <input type="file" id="inputFoto">

        <input type="text" id="nome" placeholder="Nome">
        <input type="email" id="email" placeholder="Email">

        <button onclick="salvarPerfil()">Salvar</button>

    </div>

    <div class="senha-box">
        <h3>🔒 Trocar Senha</h3>

        <input type="password" id="novaSenha" placeholder="Nova senha">
        <button onclick="trocarSenha()">Atualizar senha</button>
    </div>

</div>

<script src="perfil.js"></script>

<script src="auth.js"></script>
<script>
    validarToken();
</script>
</body>
</html>
